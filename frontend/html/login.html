<!DOCTYPE html>
<html lang="vi" class="h-full bg-[#FDFBF7] text-[#2C2623]">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập Hệ Thống - LuxeHaven Resort</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            terracotta: '#b3541e',
            clay: '#9b4117',
            sand: '#F7F3EB',
            charcoal: '#2C2623'
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .font-serif-luxury {
      font-family: 'Playfair Display', serif;
    }
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-[#FDFBF7] flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-md bg-white border border-[#E5DFD3]/80 rounded-3xl shadow-2xl overflow-hidden">
    <!-- Header Banner -->
    <div class="bg-gradient-to-tr from-[#b3541e] to-[#e38664] p-8 text-center text-white relative">
      <div class="w-12 h-12 rounded-2xl bg-white/20 backdrop-blur-md flex items-center justify-center shadow-lg mx-auto mb-4 border border-white/20">
        <i class="fa-solid fa-umbrella-beach text-white text-xl animate-pulse"></i>
      </div>
      <h1 class="text-2xl font-serif-luxury font-bold tracking-wide">LuxeHaven Resort</h1>
      <p class="text-[10px] uppercase tracking-widest text-[#F7F3EB]/90 mt-1">Cổng Quản Trị Hệ Thống</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="p-8 space-y-5" onsubmit="handleLoginSubmit(event)">
      <!-- Error Notification -->
      <div id="loginError" class="hidden p-3.5 bg-rose-50 border border-rose-200 text-rose-700 text-xs font-semibold rounded-2xl flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation text-sm"></i>
        <span id="errorMessage">Tên đăng nhập hoặc mật khẩu không đúng.</span>
      </div>

      <div class="space-y-1">
        <label class="block text-xs font-bold text-[#5C524E] uppercase tracking-wider">Tên đăng nhập (Username)</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-[#A89F9A]"><i class="fa-solid fa-user text-xs"></i></span>
          <input type="text" id="username" required placeholder="Nhập tên đăng nhập của bạn..."
            class="w-full bg-[#F7F3EB]/40 border border-[#E5DFD3] rounded-2xl pl-10 pr-3.5 py-3 text-xs focus:outline-none focus:border-[#b3541e] focus:bg-white transition-all">
        </div>
      </div>

      <div class="space-y-1">
        <label class="block text-xs font-bold text-[#5C524E] uppercase tracking-wider">Mật khẩu (Password)</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-[#A89F9A]"><i class="fa-solid fa-lock text-xs"></i></span>
          <input type="password" id="password" required placeholder="Nhập mật khẩu..."
            class="w-full bg-[#F7F3EB]/40 border border-[#E5DFD3] rounded-2xl pl-10 pr-3.5 py-3 text-xs focus:outline-none focus:border-[#b3541e] focus:bg-white transition-all">
        </div>
      </div>

      <div class="flex items-center justify-between text-xs pt-1">
        <label class="flex items-center gap-2 text-[#5C524E] font-medium cursor-pointer">
          <input type="checkbox" class="rounded border-[#E5DFD3] text-[#b3541e] focus:ring-[#b3541e]/20">
          Ghi nhớ đăng nhập
        </label>
        <a href="#" onclick="alert('Vui lòng liên hệ Quản trị viên hệ thống để khôi phục mật khẩu.')" class="font-bold text-[#b3541e] hover:text-[#9b4117] transition-all">Quên mật khẩu?</a>
      </div>

      <button type="submit"
        class="w-full bg-[#b3541e] hover:bg-[#9b4117] text-white py-3.5 rounded-2xl text-xs font-bold uppercase tracking-wider shadow-lg shadow-[#b3541e]/20 hover:shadow-[#b3541e]/30 transition-all duration-300 transform active:scale-[0.98] cursor-pointer mt-2">
        Đăng Nhập
      </button>
    </form>

    <div class="p-4 bg-stone-50 border-t border-[#E5DFD3]/40 text-center text-[10px] text-[#81726A] font-medium">
      &copy; 2026 LuxeHaven Resort - Bảo mật nghiệp vụ nội bộ.
    </div>
  </div>

  <script>
    const API_URL = '/api';

    async function handleLoginSubmit(event) {
      event.preventDefault();
      
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');
      const errorMessage = document.getElementById('errorMessage');

      errorDiv.classList.add('hidden');

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: usernameInput,
            password: passwordInput
          })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          // Store credential states in local storage
          localStorage.setItem('token', data.token);
          localStorage.setItem('userRole', data.user.role);
          localStorage.setItem('username', data.user.username);
          localStorage.setItem('fullName', data.user.full_name);
          localStorage.setItem('departmentId', data.user.departmentId || '');

          // Reroute to dashboard, housekeeping, or accounting depending on role
          if (data.user.role === 'cleaner' || data.user.role === 'technical') {
            if (data.user.departmentId || data.user.role === 'technical') {
              window.location.href = './staff_vibe.html';
            } else {
              window.location.href = './housekeeping.html';
            }
          } else if (data.user.role === 'accountant') {
            window.location.href = './accounting.html';
          } else {
            window.location.href = './dashboard_AD.html';
          }
        } else {
          errorMessage.textContent = data.message || 'Đăng nhập thất bại. Vui lòng kiểm tra lại.';
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        console.error('Login error:', err);
        errorMessage.textContent = 'Không thể kết nối đến máy chủ xác thực.';
        errorDiv.classList.remove('hidden');
      }
    }
  </script>

</body>
</html>
